<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #1a1a1a; }
      .icon { fill: #fbbf24; }
      .text { font-family: Arial, sans-serif; font-size: 28px; font-weight: bold; fill: #fbbf24; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="100" height="100" rx="20"/>
  
  <!-- Laptop/Code icon -->
  <g class="icon" transform="translate(25, 20)">
    <!-- Screen -->
    <rect x="0" y="0" width="50" height="35" rx="2" stroke="#fbbf24" stroke-width="2" fill="none"/>
    <!-- Code symbols -->
    <text x="8" y="22" style="font-size: 14px; font-family: monospace; fill: #fbbf24;">&lt;/&gt;</text>
  </g>
  
  <!-- Initials: S -->
  <text x="50" y="65" text-anchor="middle" class="text">S</text>
</svg>